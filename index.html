<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="js-widget-title" content="Family Ages">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: transparent;
            color: white;
            margin: 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            gap: 6px;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.8);
        }
        .row {
            display: flex;
            align-items: center;
            font-size: 11px;
            white-space: nowrap;
            letter-spacing: -0.1px;
        }
        .emoji {
            margin-right: 6px;
            font-size: 13px;
        }
        .age {
            font-weight: 700;
        }
        .sep {
            margin: 0 4px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="widget-container"></div>

    <script>
        // REQUIRED BY APP: Tells the widget we are ready immediately
        function __wweb2WaitMillisecondsToWidgetIsReady(currentDelayMs) {
            return 0;
        }

        const family = [
            { emoji: "👰🏻‍♀️", date: "1976-04-25" },
            { emoji: "💍", date: "2009-05-22" },
            { emoji: "🎀", date: "2013-09-02" },
            { emoji: "🧸", date: "2015-12-23" }
        ];

        function getAge(dateStr) {
            const today = new Date();
            const birthDate = new Date(dateStr);
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return months[d.getUTCMonth()] + " " + d.getUTCDate() + ", " + d.getUTCFullYear();
        }

        const container = document.getElementById('widget-container');
        
        family.forEach(person => {
            const age = getAge(person.date);
            const formattedDate = formatDate(person.date);
            
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <span class="emoji">${person.emoji}</span>
                <span>${formattedDate}</span>
                <span class="sep">•</span>
                <span class="age">${age}</span>
            `;
            container.appendChild(row);
        });
    </script>
</body>
</html>
